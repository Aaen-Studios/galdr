<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <style>
      .s { fill: none; stroke: #c8c8c8; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="400" height="400" rx="80" fill="#000"/>

  <g>
    <!-- central stave -->
    <line class="s" x1="200" y1="50" x2="200" y2="355"/>

    <!-- upper X -->
    <line class="s" x1="115" y1="95" x2="285" y2="215"/>
    <line class="s" x1="285" y1="95" x2="115" y2="215"/>

    <!-- side verticals framing the X -->
    <line class="s" x1="115" y1="95" x2="115" y2="215"/>
    <line class="s" x1="285" y1="95" x2="285" y2="215"/>

    <!-- bottom arrow/roots -->
    <line class="s" x1="200" y1="300" x2="155" y2="345"/>
    <line class="s" x1="200" y1="300" x2="245" y2="345"/>
    <line class="s" x1="200" y1="328" x2="170" y2="355"/>
    <line class="s" x1="200" y1="328" x2="230" y2="355"/>
  </g>

  <!-- dot -->
  <circle cx="200" cy="62" r="9" fill="#c8c8c8"/>
</svg>
